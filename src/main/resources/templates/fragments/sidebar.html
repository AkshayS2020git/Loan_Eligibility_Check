<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar(activePage)" class="sidebar bg-white border-end d-none d-lg-flex flex-column h-100 position-fixed">
    <div class="sidebar-header p-4 border-bottom">
        <a th:href="@{/}" class="text-decoration-none">
            <h4 class="mb-0 fw-bold text-primary brand-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                LoanCheck
            </h4>
        </a>
    </div>
    <div class="sidebar-menu flex-grow-1 p-3">
        <ul class="nav flex-column gap-1">
            <li class="nav-item">
                <a th:href="@{/}" class="nav-link py-2 px-3 rounded text-dark sidebar-link" th:classappend="${activePage == 'dashboard' ? 'active bg-primary text-white' : ''}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/apply}" class="nav-link py-2 px-3 rounded text-dark sidebar-link" th:classappend="${activePage == 'apply' ? 'active bg-primary text-white' : ''}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    Apply Loan
                </a>
            </li>

        </ul>
    </div>

</aside>

<!-- Offcanvas Sidebar for Mobile -->
<div th:fragment="mobile-sidebar(activePage)" class="offcanvas offcanvas-start" tabindex="-1" id="sidebarOffcanvas" aria-labelledby="sidebarOffcanvasLabel">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title fw-bold text-primary mb-0" id="sidebarOffcanvasLabel">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            LoanCheck
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body p-0">
        <div class="sidebar-menu p-3">
            <ul class="nav flex-column gap-1">
                <li class="nav-item">
                    <a th:href="@{/}" class="nav-link py-2 px-3 rounded text-dark sidebar-link" th:classappend="${activePage == 'dashboard' ? 'active bg-primary text-white' : ''}">
                        Dashbord
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/apply}" class="nav-link py-2 px-3 rounded text-dark sidebar-link" th:classappend="${activePage == 'apply' ? 'active bg-primary text-white' : ''}">
                        Apply Loan
                    </a>
                </li>

            </ul>
        </div>
    </div>
</div>

</body>
</html>
